<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon + Vercel Test</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 15px; display: inline-block; text-align: left; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>PostgreSQL Dummy Site</h1>
    <button onclick="fetchData()">Test Database Connection</button>
    <br><br>
    <pre id="result">Click the button to fetch data...</pre>

    <script>
        async function fetchData() {
            document.getElementById('result').innerText = "Loading...";
            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('result').innerText = "Error: " + err.message;
            }
        }
    </script>

</body>
</html>
